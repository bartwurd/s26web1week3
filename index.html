<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Week 3 - Semantics and Lists</title>
</head>
<body>
    <header>
        <h1>HTML Week 3 - Semantics and Lists</h1>
        <h3>Plus an intro to CSS</h3>
    </header>
    <nav>
        <!-- the nav tag reserves a space for navigation -->
         <a href="#">Home</a>
    </nav>
    <main>
        <!-- article is a self-contained block of text -->
    <article>
        <!-- an article needs a head tag (h1-h6) -->
        <h2>An article is a self-contained block of text</h2>
        <p>Article content goes here.</p>
    </article>
    <!-- an aside is for separate content that isn't necessary to understand the page-->
    <aside>
        <h3>Asides should also have a heading</h3>
        <p>This is the text in the aside</p>
    </aside>
    </main>
    <footer>
        <p>scary stuff &copy; scary people</p>
    </footer>
</body>
</html>
